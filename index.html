<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tematické degustace vín - Amantes Vinea Club</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .tasting-card { transition: transform 0.3s ease, box-shadow 0.3s ease; border-radius: 0.75rem; }
        .tasting-card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.15); }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #b91c1c; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <div class="absolute top-4 right-4 z-50">
        <button id="auth-nav-btn" class="bg-gray-800 text-white px-4 py-2 rounded shadow hover:bg-gray-700 text-sm font-semibold transition flex items-center">
            Přihlášení pro členy
        </button>
    </div>

    <div id="app" class="container mx-auto p-4 md:p-12 max-w-6xl relative mt-8">
        
        <div id="error-message" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-6 shadow">
            <strong class="font-bold">Chyba!</strong>
            <span class="block sm:inline" id="error-text"></span>
        </div>

        <div id="home">
            <header class="text-center mb-16 pt-8">
                <img src="amantes_vinea_logo.png" alt="Logo klubu" class="h-28 mx-auto mb-6 drop-shadow-lg" onerror="this.onerror=null;this.src='https://placehold.co/250x110/374151/ffffff?text=Amantes+Vinea';">
                <h1 class="text-5xl md:text-6xl font-extrabold text-gray-900 mb-4 tracking-tight">Tematické degustace</h1>
                <p class="text-xl text-gray-600 italic">Výjimečné termíny. Pouze pro členy klubu.</p>
            </header>
            
            <div id="home-loader" class="loader hidden"></div>
            <main id="tasting-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10"></main>
        </div>

        <div id="detail" class="hidden">
            <header class="mb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <button id="back-button" class="bg-gray-800 text-white py-2 px-5 rounded-xl hover:bg-gray-700 transition-colors text-lg font-semibold shadow-lg">
                    &larr; Zpět na přehled
                </button>
                <h1 id="detail-title" class="text-3xl md:text-4xl font-bold text-gray-900 text-right flex-1"></h1>
            </header>

            <div class="bg-white p-6 rounded-xl shadow-lg border border-gray-200 mb-8">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-4">
                    <h3 class="text-xl font-bold text-gray-900 flex items-center">
                        <svg class="w-6 h-6 mr-2 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        Přihlášení účastníci
                    </h3>
                    <div id="attendance-controls">
                        </div>
                </div>
                <div id="attendees-list" class="flex flex-wrap gap-2">
                    <p class="text-gray-500 italic text-sm">Zatím není nikdo přihlášen.</p>
                </div>
            </div>

            <div class="mb-6 flex justify-between items-center bg-gray-50 p-4 rounded-xl border border-gray-200">
                <div>
                    <h3 class="font-bold text-gray-900 text-lg">Degustační vzorky</h3>
                    <p class="text-sm text-gray-600">Seznam vín pro tento večer.</p>
                </div>
                <div>
                    <button id="toggle-add-wine-btn" class="hidden bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-5 rounded-lg shadow transition">
                        Přidat vzorek
                    </button>
                    <p id="add-wine-closed-msg" class="hidden text-red-600 font-bold bg-red-50 border border-red-200 px-4 py-2 rounded-lg text-sm">
                        ⚠️ Příjem vzorků ukončen.
                    </p>
                </div>
            </div>

            <div id="add-wine-container" class="hidden bg-white p-6 rounded-xl shadow-lg border border-gray-200 mb-8">
                <h3 id="wine-form-title" class="text-xl font-bold text-gray-900 mb-4 border-b pb-2">Nové víno</h3>
                <form id="add-wine-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="hidden" id="wine-id">
                    <input type="text" id="input-name" placeholder="Název vína (např. Kerner 2024)" class="border p-3 rounded-lg w-full" required>
                    <input type="text" id="input-winery" placeholder="Vinařství" class="border p-3 rounded-lg w-full" required>
                    
                    <select id="input-classification" class="border p-3 rounded-lg w-full">
                        <option value="">-- Klasifikace --</option>
                        <option value="Moravské zemské víno">Moravské zemské víno</option>
                        <option value="Pozdní sběr">Pozdní sběr</option>
                        <option value="Výběr z hroznů">Výběr z hroznů</option>
                    </select>

                    <select id="input-sweetness" class="border p-3 rounded-lg w-full">
                        <option value="">-- Cukernatost --</option>
                        <option value="Suché">Suché</option>
                        <option value="Polosuché">Polosuché</option>
                        <option value="Polosladké">Polosladké</option>
                        <option value="Sladké">Sladké</option>
                    </select>

                    <input type="text" id="input-alcohol" placeholder="Alkohol (např. 12,5 %)" class="border p-3 rounded-lg w-full">
                    <input type="text" id="input-origin" placeholder="Původ (podoblast, obec)" class="border p-3 rounded-lg w-full">
                    
                    <div class="md:col-span-2">
                        <textarea id="input-pairing" placeholder="Párování s jídlem nebo poznámka" class="border p-3 rounded-lg w-full h-20"></textarea>
                    </div>

                    <div class="md:col-span-2 flex flex-col sm:flex-row gap-3">
                        <button type="submit" class="flex-grow bg-red-700 text-white font-bold py-3 px-6 rounded-lg hover:bg-red-800 shadow-md transition">
                            Uložit víno do databáze
                        </button>
                        <button type="button" id="cancel-wine-edit-btn" class="hidden sm:w-1/3 bg-gray-200 text-gray-800 font-bold py-3 px-6 rounded-lg hover:bg-gray-300 shadow-sm transition">
                            Zrušit úpravu
                        </button>
                    </div>
                </form>
            </div>
            
            <div id="wine-loader" class="loader hidden"></div>
            <main id="wine-list" class="space-y-6"></main>
        </div>

        <div id="login-view" class="hidden max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg border mt-20">
            <h2 class="text-2xl font-bold mb-6 text-center">Přihlášení do klubu</h2>
            
            <button id="google-login-btn" class="w-full bg-white border border-gray-300 text-gray-700 font-bold py-3 rounded-lg hover:bg-gray-50 transition shadow-sm flex items-center justify-center mb-6">
                <svg class="w-6 h-6 mr-3" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Přihlásit přes Google
            </button>

            <div class="relative flex py-5 items-center">
                <div class="flex-grow border-t border-gray-300"></div>
                <span class="flex-shrink-0 mx-4 text-gray-400 text-sm">nebo e-mailem</span>
                <div class="flex-grow border-t border-gray-300"></div>
            </div>

            <form id="login-form" class="space-y-4">
                <input type="email" id="login-email" placeholder="E-mail" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-red-500 outline-none">
                <input type="password" id="login-password" placeholder="Heslo" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-red-500 outline-none">
                <button type="submit" class="w-full bg-gray-900 text-white font-bold py-3 rounded-lg hover:bg-gray-800 transition">Přihlásit e-mailem</button>
            </form>
            
            <button type="button" id="cancel-login-btn" class="w-full text-gray-500 hover:text-gray-800 mt-4 py-2 font-medium transition">Zrušit a zpět</button>
        </div>

        <div id="dashboard-view" class="hidden">
            <header class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-center border-b pb-4 gap-4">
                <div>
                    <h1 class="text-3xl font-bold text-gray-900">Můj profil</h1>
                    <span id="user-greeting" class="text-gray-600"></span>
                </div>
                <div class="flex gap-4 items-center w-full md:w-auto">
                    <button id="logout-btn" class="bg-gray-200 text-gray-800 px-5 py-2 rounded-lg font-bold hover:bg-gray-300 transition shadow-sm w-full md:w-auto">Odhlásit se</button>
                    <button id="close-dashboard-btn" class="bg-gray-800 text-white px-5 py-2 rounded-lg font-bold hover:bg-gray-700 transition shadow-sm w-full md:w-auto">Zpět na akce</button>
                </div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1 bg-white p-4 rounded-xl shadow-lg border border-gray-100">
                    <h3 class="font-bold text-lg mb-4 text-gray-800 border-b pb-2">Seznam akcí (Admin)</h3>
                    <div id="admin-events-list" class="space-y-2 max-h-96 overflow-y-auto pr-2"></div>
                    <button id="btn-new-event" class="w-full mt-6 bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 transition shadow">+ Vytvořit novou akci</button>
                </div>

                <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow-lg border border-gray-100">
                    <h3 id="admin-form-title" class="font-bold text-xl mb-6 text-gray-800 border-b pb-2">Přidat novou akci</h3>
                    <form id="admin-event-form" class="space-y-5">
                        <input type="hidden" id="event-id">
                        <div><label class="block text-sm font-semibold text-gray-700 mb-1">Název akce</label><input type="text" id="event-theme" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-red-500 outline-none" required></div>
                        <div><label class="block text-sm font-semibold text-gray-700 mb-1">Datum ukončení (např. 10.4.2026 16:30)</label><input type="datetime-local" id="event-date" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-red-500 outline-none" required></div>
                        <div><label class="block text-sm font-semibold text-gray-700 mb-1">Zobrazované datum</label><input type="text" id="event-display-date" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-red-500 outline-none" required></div>
                        <div><label class="block text-sm font-semibold text-gray-700 mb-1">Krátký popis</label><textarea id="event-desc" rows="3" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-red-500 outline-none" required></textarea></div>
                        <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Obrázek (Automaticky se zmenší)</label>
                            <input type="file" id="event-image" accept="image/*" class="w-full border p-2 rounded bg-white">
                        </div>
                        <button type="submit" id="submit-event-btn" class="w-full bg-red-700 text-white font-bold py-4 rounded-lg hover:bg-red-800 transition shadow-lg text-lg mt-4">Uložit akci do databáze</button>
                    </form>
                </div>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, update, remove, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAn6jNCHyJNo194jOPMrate3vQ-sBQdsrk",
            authDomain: "amantesvinea.firebaseapp.com",
            databaseURL: "https://amantesvinea-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "amantesvinea",
            storageBucket: "amantesvinea.firebasestorage.app",
            messagingSenderId: "314403202533",
            appId: "1:314403202533:web:db9eb6416a8710a837bb0c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        let currentTastingId = null;
        let globalTastings = [];
        let currentUser = null; 
        
        function getFirstName(user) {
            if (!user) return null;
            if (user.displayName) return user.displayName.split(' ')[0];
            if (user.email) {
                let namePart = user.email.split('@')[0].split('.')[0];
                return namePart.charAt(0).toUpperCase() + namePart.slice(1);
            }
            return "Člen";
        }

        const views = {
            home: document.getElementById('home'),
            detail: document.getElementById('detail'),
            login: document.getElementById('login-view'),
            dashboard: document.getElementById('dashboard-view')
        };
        const errorMsg = document.getElementById('error-message');
        const errorText = document.getElementById('error-text');
        
        function showError(msg) {
            errorText.innerText = msg;
            errorMsg.classList.remove('hidden');
            setTimeout(() => { errorMsg.classList.add('hidden'); }, 6000);
        }

        function switchView(viewName) {
            Object.values(views).forEach(v => v.classList.add('hidden'));
            views[viewName].classList.remove('hidden');
            errorMsg.classList.add('hidden');
            window.scrollTo(0, 0);
        }

        // --- AUTH A NAVIGACE ---
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            const navBtn = document.getElementById('auth-nav-btn');
            const userGreeting = document.getElementById('user-greeting');
            
            if (user) {
                navBtn.textContent = "Můj profil (" + getFirstName(user) + ")";
                userGreeting.textContent = "Vítejte, " + getFirstName(user) + "!";
            } else {
                navBtn.textContent = "Přihlášení pro členy";
            }

            if (currentTastingId && !views.detail.classList.contains('hidden')) {
                const currentTasting = globalTastings.find(t => t.id === currentTastingId);
                if (currentTasting) showDetailPage(currentTasting);
            }
        });

        document.getElementById('auth-nav-btn').addEventListener('click', () => {
            if (currentUser) { switchView('dashboard'); } else { switchView('login'); }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => { switchView('home'); });
        });

        document.getElementById('close-dashboard-btn').addEventListener('click', () => switchView('home'));
        document.getElementById('cancel-login-btn').addEventListener('click', () => switchView('home'));
        document.getElementById('back-button').addEventListener('click', () => {
            switchView('home');
            currentTastingId = null;
        });

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-password').value)
                .then(() => {
                    document.getElementById('login-form').reset();
                    switchView('home');
                }).catch(err => showError("Špatné přihlašovací údaje."));
        });

        document.getElementById('google-login-btn').addEventListener('click', () => {
            signInWithPopup(auth, googleProvider).then(() => {
                switchView('home');
            }).catch((err) => showError("Chyba při přihlášení: " + err.message));
        });

        function getTimeRemaining(dateString) {
            const eventDate = new Date(dateString); eventDate.setHours(0, 0, 0, 0);
            const today = new Date(); today.setHours(0, 0, 0, 0);
            const diffTime = eventDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            if (diffDays < -3) return 'Proběhlo'; 
            if (diffDays <= 0) return 'Právě probíhá';
            if (diffDays === 1) return 'Zítra!';
            if (diffDays < 7) return `Za ${diffDays} dny`;
            if (diffDays <= 30) return `Za ${diffDays} dní`;
            return `Za ${Math.floor(diffDays / 30)} měsíců`;
        }
        function isRegistrationOpen(dateString) { return new Date() < new Date(dateString); }

        // --- NAČÍTÁNÍ AKCÍ ---
        onValue(ref(db, 'tastings'), (snapshot) => {
            document.getElementById('home-loader').classList.remove('hidden');
            const data = snapshot.val();
            const listContainer = document.getElementById('tasting-list');
            const adminListContainer = document.getElementById('admin-events-list');
            listContainer.innerHTML = ''; adminListContainer.innerHTML = '';
            
            if (!data) {
                document.getElementById('home-loader').classList.add('hidden');
                return;
            }

            globalTastings = Object.keys(data).map(key => ({ id: key, ...data[key] }));
            globalTastings.sort((a, b) => new Date(b.date) - new Date(a.date));

            globalTastings.forEach(tasting => {
                const isPast = getTimeRemaining(tasting.date) === 'Proběhlo';
                const card = document.createElement('div');
                card.className = "tasting-card bg-white rounded-xl shadow-lg overflow-hidden cursor-pointer flex flex-col";
                card.onclick = () => showDetailPage(tasting);
                card.innerHTML = `
                    <img src="${tasting.image || 'https://placehold.co/600x400/374151/ffffff?text=' + tasting.theme}" class="w-full h-52 object-cover">
                    <div class="p-6 flex-grow flex flex-col justify-between">
                        <div>
                            <p class="text-sm font-semibold mb-2 ${isPast ? 'text-gray-400' : 'text-red-600'}">${getTimeRemaining(tasting.date)} &middot; ${tasting.displayDate}</p>
                            <h2 class="text-2xl font-bold text-gray-900 mt-1 mb-3">${tasting.theme}</h2>
                        </div>
                    </div>`;
                listContainer.appendChild(card);

                const adminItem = document.createElement('div');
                adminItem.className = "p-3 border rounded-lg flex justify-between items-center hover:bg-gray-50 mb-2";
                adminItem.innerHTML = `
                    <div><p class="font-bold text-sm">${tasting.theme}</p><p class="text-xs text-gray-500">${tasting.displayDate}</p></div>
                    <button class="bg-blue-50 px-3 py-1.5 rounded border border-blue-200 text-xs font-bold text-blue-700 edit-event-btn" data-id="${tasting.id}">Upravit</button>
                `;
                adminListContainer.appendChild(adminItem);
            });

            document.querySelectorAll('.edit-event-btn').forEach(btn => {
                btn.addEventListener('click', (e) => loadEventIntoForm(e.target.dataset.id));
            });
            document.getElementById('home-loader').classList.add('hidden');
        });

        // --- ZOBRAZENÍ DETAILU & ÚČASTNÍKŮ ---
        let attendeesUnsubscribe = null;

        window.showDetailPage = function(tasting) {
            currentTastingId = tasting.id;
            document.getElementById('detail-title').textContent = tasting.theme;
            switchView('detail');
            
            // Formulář Vína - Reset
            resetWineForm();
            const btnAdd = document.getElementById('toggle-add-wine-btn');
            const msgClosed = document.getElementById('add-wine-closed-msg');
            
            if (isRegistrationOpen(tasting.date)) {
                btnAdd.classList.remove('hidden'); msgClosed.classList.add('hidden');
            } else {
                btnAdd.classList.add('hidden'); msgClosed.classList.remove('hidden');
            }

            // Načtení Účastníků
            if (attendeesUnsubscribe) attendeesUnsubscribe();
            attendeesUnsubscribe = onValue(ref(db, 'attendees/' + currentTastingId), (snapshot) => {
                const data = snapshot.val() || {};
                const listEl = document.getElementById('attendees-list');
                listEl.innerHTML = '';
                
                const attendeesKeys = Object.keys(data);
                if (attendeesKeys.length === 0) {
                    listEl.innerHTML = '<p class="text-gray-500 italic text-sm">Zatím není nikdo přihlášen.</p>';
                } else {
                    attendeesKeys.forEach(uid => {
                        const name = data[uid].firstName;
                        listEl.innerHTML += `<span class="bg-blue-50 border border-blue-200 text-blue-800 px-3 py-1 rounded-full text-sm font-semibold">${name}</span>`;
                    });
                }
                renderAttendanceControls(data);
            });

            // Načtení Vín
            const wineLoader = document.getElementById('wine-loader');
            const wineList = document.getElementById('wine-list');
            wineList.innerHTML = ''; wineLoader.classList.remove('hidden');

            onValue(query(ref(db, 'wines'), orderByChild('tastingId'), equalTo(currentTastingId)), (snapshot) => {
                wineList.innerHTML = '';
                const data = snapshot.val();
                if (!data) {
                    wineList.innerHTML = `<div class="text-center bg-white p-8 rounded-xl border border-dashed border-gray-300"><p class="text-gray-500 italic">Zatím nebyla přidána žádná vína.</p></div>`;
                    wineLoader.classList.add('hidden');
                    return;
                }

                const wines = Object.keys(data).map(key => ({ id: key, ...data[key] })).sort((a, b) => (a.createdAt || '').localeCompare(b.createdAt || ''));
                wines.forEach((wine, index) => {
                    const wineCard = document.createElement('div');
                    wineCard.className = "bg-white rounded-xl shadow-sm border border-gray-100 p-6 border-l-8 border-l-red-700 relative flex flex-col";
                    
                    const godfatherBadge = wine.godfather ? `<div class="absolute top-4 right-4 bg-yellow-100 text-yellow-800 text-xs font-bold px-3 py-1 rounded-full border border-yellow-200">Kmotr vzorku: ${wine.godfather}</div>` : '';

                    // Modul pro editaci a smazání
                    const actionsHtml = currentUser ? `
                        <div class="mt-4 pt-4 border-t border-gray-100 flex justify-end gap-4">
                            <button class="text-blue-600 hover:text-blue-800 text-sm font-semibold flex items-center transition edit-wine-btn" data-id="${wine.id}">
                                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                                Upravit
                            </button>
                            <button class="text-red-500 hover:text-red-700 text-sm font-semibold flex items-center transition delete-wine-btn" data-id="${wine.id}">
                                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                Smazat
                            </button>
                        </div>
                    ` : '';

                    wineCard.innerHTML = `
                        ${godfatherBadge}
                        <h3 class="text-xl font-bold text-gray-900 mb-1 pr-32"><span class="text-red-700 mr-2">${index+1}.</span> ${wine.name}</h3>
                        <p class="text-md text-gray-600 font-medium mb-4">${wine.winery}</p>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-y-4 gap-x-2 text-sm bg-gray-50 p-4 rounded-lg flex-grow">
                            <div><p class="text-gray-400 text-xs uppercase tracking-wide">Klasifikace</p><p class="font-bold text-gray-800">${wine.classification || '-'}</p></div>
                            <div><p class="text-gray-400 text-xs uppercase tracking-wide">Cukernatost</p><p class="font-bold text-gray-800">${wine.sweetness || '-'}</p></div>
                            <div><p class="text-gray-400 text-xs uppercase tracking-wide">Alkohol</p><p class="font-bold text-gray-800">${wine.alcohol || '-'}</p></div>
                            <div><p class="text-gray-400 text-xs uppercase tracking-wide">Původ</p><p class="font-bold text-gray-800">${wine.origin || '-'}</p></div>
                        </div>
                        ${wine.pairing ? `<div class="mt-4"><p class="text-gray-500 text-xs uppercase tracking-wide mb-1">Poznámka:</p><p class="text-sm font-medium text-gray-700">${wine.pairing}</p></div>` : ''}
                        ${actionsHtml}
                    `;
                    wineList.appendChild(wineCard);
                });

                // Připojení logiky na editaci vzorku
                document.querySelectorAll('.edit-wine-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const wineId = e.currentTarget.dataset.id;
                        const wineToEdit = wines.find(w => w.id === wineId);
                        if(wineToEdit) loadWineIntoForm(wineToEdit);
                    });
                });

                // Připojení logiky na smazání vzorku
                document.querySelectorAll('.delete-wine-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const wineId = e.currentTarget.dataset.id;
                        if(confirm("Opravdu chcete tento vzorek odstranit z degustace?")) {
                            remove(ref(db, 'wines/' + wineId))
                                .catch(err => showError("Chyba při mazání: " + err.message));
                        }
                    });
                });

                wineLoader.classList.add('hidden');
            });
        }

        function renderAttendanceControls(attendeesData = null) {
            const container = document.getElementById('attendance-controls');
            container.innerHTML = '';
            
            if (!currentUser) {
                container.innerHTML = '<span class="text-sm text-gray-500 italic">Pro přihlášení se musíte přihlásit do klubu.</span>';
                return;
            }

            const checkData = attendeesData || {}; 
            const isAttending = checkData[currentUser.uid] !== undefined;

            const btn = document.createElement('button');
            if (isAttending) {
                btn.className = "bg-red-100 hover:bg-red-200 text-red-800 font-bold py-2 px-4 rounded-lg shadow-sm transition border border-red-200 text-sm";
                btn.innerText = "Zrušit moji účast";
                btn.onclick = () => remove(ref(db, `attendees/${currentTastingId}/${currentUser.uid}`));
            } else {
                btn.className = "bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg shadow transition text-sm";
                btn.innerText = "Zúčastním se";
                btn.onclick = () => set(ref(db, `attendees/${currentTastingId}/${currentUser.uid}`), { firstName: getFirstName(currentUser) });
            }
            container.appendChild(btn);
        }

        // --- ZPRACOVÁNÍ FORMULÁŘE PRO VÍNA ---
        
        // Reset formuláře
        window.resetWineForm = function(hideContainer = true) {
            document.getElementById('add-wine-form').reset();
            document.getElementById('wine-id').value = '';
            document.getElementById('wine-form-title').innerText = "Nové víno";
            document.getElementById('cancel-wine-edit-btn').classList.add('hidden');
            if (hideContainer) {
                document.getElementById('add-wine-container').classList.add('hidden');
                document.getElementById('toggle-add-wine-btn').innerHTML = "Přidat vzorek";
            }
        }

        // Načtení dat do formuláře pro úpravu
        window.loadWineIntoForm = function(wine) {
            document.getElementById('add-wine-container').classList.remove('hidden');
            document.getElementById('toggle-add-wine-btn').innerHTML = "Zavřít formulář";
            
            document.getElementById('wine-form-title').innerText = "Úprava vzorku: " + wine.name;
            document.getElementById('wine-id').value = wine.id;
            document.getElementById('input-name').value = wine.name || '';
            document.getElementById('input-winery').value = wine.winery || '';
            document.getElementById('input-classification').value = wine.classification || '';
            document.getElementById('input-sweetness').value = wine.sweetness || '';
            document.getElementById('input-alcohol').value = wine.alcohol || '';
            document.getElementById('input-origin').value = wine.origin || '';
            document.getElementById('input-pairing').value = wine.pairing || '';

            document.getElementById('cancel-wine-edit-btn').classList.remove('hidden');
            
            // Plynulé odrolování nahoru k formuláři
            window.scrollTo({ top: document.getElementById('add-wine-container').offsetTop - 20, behavior: 'smooth' });
        }

        // Tlačítko pro rozbalení/zabalení formuláře
        document.getElementById('toggle-add-wine-btn').addEventListener('click', (e) => {
            const formContainer = document.getElementById('add-wine-container');
            if (formContainer.classList.contains('hidden')) {
                resetWineForm(false); // Vyčistíme, ale neskryjeme
                formContainer.classList.remove('hidden');
                e.target.innerHTML = "Zavřít formulář";
            } else {
                formContainer.classList.add('hidden');
                e.target.innerHTML = "Přidat vzorek";
            }
        });

        // Tlačítko "Zrušit úpravu"
        document.getElementById('cancel-wine-edit-btn').addEventListener('click', () => {
            resetWineForm(true);
        });

        // Odeslání formuláře (Nové víno i Úprava)
        document.getElementById('add-wine-form').addEventListener('submit', (e) => {
            e.preventDefault();
            if (!currentTastingId) return;
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerText = "Ukládám..."; btn.disabled = true;

            const wineId = document.getElementById('wine-id').value;

            const wineData = {
                tastingId: currentTastingId,
                name: document.getElementById('input-name').value,
                winery: document.getElementById('input-winery').value,
                classification: document.getElementById('input-classification').value,
                sweetness: document.getElementById('input-sweetness').value,
                alcohol: document.getElementById('input-alcohol').value,
                origin: document.getElementById('input-origin').value,
                pairing: document.getElementById('input-pairing').value
            };

            if (wineId) {
                // Úprava existujícího vína
                update(ref(db, 'wines/' + wineId), wineData).then(() => {
                    resetWineForm(true);
                    alert("Víno úspěšně upraveno!");
                }).catch(err => showError("Chyba při úpravě: " + err.message)).finally(() => {
                    btn.innerText = "Uložit víno do databáze"; btn.disabled = false;
                });
            } else {
                // Přidání nového vína
                wineData.createdAt = new Date().toISOString();
                if (currentUser) {
                    wineData.godfather = getFirstName(currentUser);
                    wineData.userId = currentUser.uid;
                }
                push(ref(db, 'wines'), wineData).then(() => {
                    resetWineForm(true);
                    alert("Víno úspěšně přidáno!");
                }).catch(err => showError("Chyba při ukládání: " + err.message)).finally(() => {
                    btn.innerText = "Uložit víno do databáze"; btn.disabled = false;
                });
            }
        });

        // --- ADMINISTRACE AKCÍ ---
        const adminForm = document.getElementById('admin-event-form');
        document.getElementById('btn-new-event').addEventListener('click', () => {
            adminForm.reset();
            document.getElementById('event-id').value = '';
            document.getElementById('admin-form-title').innerText = "Přidat novou akci";
        });
        function loadEventIntoForm(id) {
            const tasting = globalTastings.find(t => t.id === id);
            if (!tasting) return;
            document.getElementById('admin-form-title').innerText = "Upravit: " + tasting.theme;
            document.getElementById('event-id').value = tasting.id;
            document.getElementById('event-theme').value = tasting.theme || '';
            document.getElementById('event-desc').value = tasting.description || '';
            document.getElementById('event-display-date').value = tasting.displayDate || '';
            if (tasting.date) {
                const d = new Date(tasting.date); d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
                document.getElementById('event-date').value = d.toISOString().slice(0, 16);
            }
            switchView('dashboard'); window.scrollTo(0, document.getElementById('admin-event-form').offsetTop);
        }
        function processImageFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image(); img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        if (w > h) { if (w > 800) { h *= 800 / w; w = 800; } } else { if (h > 800) { w *= 800 / h; h = 800; } }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                    img.onerror = reject;
                }; reader.onerror = reject;
            });
        }
        adminForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-event-btn');
            submitBtn.innerText = "Ukládám..."; submitBtn.disabled = true;
            const eventId = document.getElementById('event-id').value;
            const fileInput = document.getElementById('event-image');
            let imageUrl = null;
            try {
                if (fileInput.files.length > 0) {
                    if (fileInput.files[0].size > 5 * 1024 * 1024) throw new Error("Soubor je příliš velký. Max 5 MB.");
                    imageUrl = await processImageFile(fileInput.files[0]);
                }
                const eventData = {
                    theme: document.getElementById('event-theme').value,
                    description: document.getElementById('event-desc').value,
                    date: new Date(document.getElementById('event-date').value).toISOString(),
                    displayDate: document.getElementById('event-display-date').value
                };
                if (imageUrl) eventData.image = imageUrl;
                if (eventId) {
                    await update(ref(db, 'tastings/' + eventId), eventData); alert("Akce úspěšně upravena!");
                } else {
                    await push(ref(db, 'tastings'), eventData); alert("Nová akce úspěšně vytvořena!");
                }
                adminForm.reset(); document.getElementById('event-id').value = ''; document.getElementById('admin-form-title').innerText = "Přidat novou akci";
            } catch (error) { showError("Chyba při ukládání: " + error.message);
            } finally { submitBtn.innerText = "Uložit akci do databáze"; submitBtn.disabled = false; }
        });
    </script>
</body>
</html>
